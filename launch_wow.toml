# 通用多程序启动配置
# 1) exe 如果不是绝对路径，会按“本配置文件所在目录”解析
# 2) 每个 [[apps]] 会按顺序依次启动
# 3) x / y 以主屏幕左上角为原点，单位像素
# 4) WoW 4.3.4 自动登录目前按角色索引选择角色，0 表示第一个角色

[defaults]
wait_timeout_ms = 60000
wait_after_launch_ms = 0
enforce_interval_ms = 200
stable_confirmations = 5
position_tolerance = 4

[[apps]]
name = "wow"
exe = "Wow.exe"
args = ["-windowed"]
process_names = [
  "wow.exe",
  "wow-64.exe",
  "wowclassic.exe",
  "wowclassict.exe",
  "wowclasst.exe",
  "wowb.exe",
]
class_hints = ["GxWindowClass"]
title_hints = ["World of Warcraft"]
x = 100
y = 100
width = 500
height = 500
wow_auto_login = false
wow_account = "your-account"
wow_password = "your-password"
wow_character_index = 0
# wow_password_env = "WOW_PASSWORD"

[[apps]]
enabled = false
name = "notepad"
exe = "C:\\Windows\\System32\\notepad.exe"
title_hints = ["notepad", "记事本"]
x = 650
y = 100
width = 900
height = 700
